<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Companion AI</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  
  <div id="auth-overlay" class="glass-panel">
    <h2>Learning Companion AI</h2>
    <p>Sign in to begin your Active Recall sessions.</p>
    <button id="login-btn" class="neon-btn">Sign In with Google</button>
  </div>

  <main id="app-container" class="hidden">
    <!-- Sidebar / Stats -->
    <aside class="glass-panel sidebar">
      <h3>Active Sessions</h3>
      <div id="stats-container">
         <p>Recall Loop Status: <span class="neon-text-purple">Active</span></p>
         <p>Techniques Mastered: <span id="mastered-count" class="neon-text-cyan">0</span></p>
      </div>
      <button id="logout-btn" class="neon-btn outline">Log Out</button>
    </aside>

    <!-- Main Workspace: Feynman Technique -->
    <section class="glass-panel workspace">
      <header>
        <h2>Feynman Engine</h2>
        <p>Explain a concept as if you were teaching a beginner.</p>
      </header>

      <div class="feynman-io">
        <input type="text" id="topic-input" placeholder="Topic (e.g. Quantum Computing)" />
        <textarea id="explanation-input" placeholder="Your simplified explanation goes here..."></textarea>
        <button id="submit-explanation" class="neon-btn">Evaluate via AI</button>
      </div>

      <div class="feynman-evaluation">
        <h3>AI Evaluation</h3>
        <div id="evaluation-result" class="glass-inner-panel">
          <p class="placeholder-text">Awaiting submission...</p>
        </div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
